services:

  mongodb:
    image: mongo:7
    container_name: libertia_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - libertia_network

  ollama:
    image: ollama/ollama:latest
    container_name: libertia_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - libertia_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: libertia_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/libertia
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OLLAMA_URL: http://ollama:11434/api/generate
    depends_on:
      - mongodb
      - ollama
    volumes:
      - ./ai:/app/ai
      - chroma_data:/app/ai/chroma_db
    networks:
      - libertia_network

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: libertia_ai
    restart: unless-stopped
    environment:
      PYTHONIOENCODING: utf-8
      MONGO_URI: mongodb://mongodb:27017/libertia
    depends_on:
      - mongodb
      - ollama
    volumes:
      - ./ai:/app
      - chroma_data:/app/chroma_db
    networks:
      - libertia_network

volumes:
  mongodb_data:
  ollama_data:
  chroma_data:

networks:
  libertia_network:
    driver: bridge
