name: Deploy to Google Cloud

on:
  push:
    branches:
      - develop

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  BACKEND_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/libertia-backend
  AI_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/libertia-ai
  CLOUD_RUN_SERVICE: libertia-backend

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build & Push Docker images → GCR
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push to GCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── Backend ──
      - name: Build backend image
        run: |
          docker build \
            --tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.BACKEND_IMAGE }}:latest \
            ./server

      - name: Push backend image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      # ── AI service ──
      - name: Build AI image
        run: |
          docker build \
            --tag ${{ env.AI_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.AI_IMAGE }}:latest \
            ./ai

      - name: Push AI image
        run: |
          docker push ${{ env.AI_IMAGE }}:${{ github.sha }}
          docker push ${{ env.AI_IMAGE }}:latest

  # ─────────────────────────────────────────
  # JOB 2 : Deploy Backend → Cloud Run
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --port=5000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
          env_vars: |
            NODE_ENV=production
            PORT=5000
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            OLLAMA_URL=${{ secrets.OLLAMA_URL }}

      - name: Show Cloud Run URL
        run: |
          echo "Backend deployed at:"
          gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)"

  # ─────────────────────────────────────────
  # JOB 3 : Build & Deploy Frontend → Firebase
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.BACKEND_URL }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
